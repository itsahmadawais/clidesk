# .goreleaser.yaml — optional, more powerful alternative to release.yml
# Run: goreleaser release --clean
# Docs: https://goreleaser.com

version: 2

project_name: clidesk

before:
  hooks:
    - go mod download

builds:
  - id: clidesk
    main: .
    binary: clidesk
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "clidesk-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - shell/clidesk.ps1
      - shell/clidesk.sh

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: itsahmadawais
    name: clidesk
  draft: false
  prerelease: auto
  name_template: "CLIDesk {{.Tag}}"

